<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#grad1)" stroke="#1E40AF" stroke-width="1"/>
  
  <!-- Calculator/Finance icon -->
  <rect x="8" y="6" width="16" height="20" rx="2" fill="white" opacity="0.9"/>
  <rect x="10" y="8" width="12" height="3" rx="1" fill="#3B82F6"/>
  
  <!-- Calculator buttons -->
  <rect x="10" y="13" width="2" height="2" rx="0.5" fill="#6B7280"/>
  <rect x="14" y="13" width="2" height="2" rx="0.5" fill="#6B7280"/>
  <rect x="18" y="13" width="2" height="2" rx="0.5" fill="#6B7280"/>
  <rect x="22" y="13" width="2" height="2" rx="0.5" fill="#6B7280"/>
  
  <rect x="10" y="17" width="2" height="2" rx="0.5" fill="#6B7280"/>
  <rect x="14" y="17" width="2" height="2" rx="0.5" fill="#6B7280"/>
  <rect x="18" y="17" width="2" height="2" rx="0.5" fill="#6B7280"/>
  <rect x="22" y="17" width="2" height="2" rx="0.5" fill="#6B7280"/>
  
  <rect x="10" y="21" width="2" height="2" rx="0.5" fill="#6B7280"/>
  <rect x="14" y="21" width="2" height="2" rx="0.5" fill="#6B7280"/>
  <rect x="18" y="21" width="2" height="2" rx="0.5" fill="#6B7280"/>
  <rect x="22" y="21" width="2" height="2" rx="0.5" fill="#6B7280"/>
  
  <!-- Plus and minus signs -->
  <text x="11" y="14.5" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">+</text>
  <text x="15" y="14.5" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">-</text>
  <text x="19" y="14.5" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">×</text>
  <text x="23" y="14.5" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">÷</text>
</svg>

